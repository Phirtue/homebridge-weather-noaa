name: OpenSSF Scorecard

# Third-party verifiability for the security claims this repository makes:
# Scorecard audits things a code reviewer cannot verify from a clone, such
# as whether branch protection is actually enforced. Results publish to
# the public Scorecard API (the README badge) and to code scanning.
on:
  schedule:
    - cron: '30 14 * * 1'
  push:
    branches: [main]
  # Re-run when branch protection settings change, since Scorecard scores them.
  branch_protection_rule:
  # Manual re-runs, e.g. after changing release assets or repo settings.
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the Scorecard REST API for the badge

    steps:
      # Block-mode egress control. Scorecard queries a fixed set of
      # services: GitHub, OSV and deps.dev for vulnerability data, the
      # Best Practices badge API, Sigstore (to sign published results),
      # and the Scorecard REST API. Endpoint list per StepSecurity's
      # published policy for scorecard workflows.
      - name: Harden runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.deps.dev:443
            api.github.com:443
            api.osv.dev:443
            api.scorecard.dev:443
            api.securityscorecards.dev:443
            fulcio.sigstore.dev:443
            github.com:443
            oauth2.sigstore.dev:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            www.bestpractices.dev:443

      # Actions pinned to commit SHAs so a compromised tag cannot inject code.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
