name: CI Build and Runtime Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege token: this workflow only needs to read the repository.
permissions:
  contents: read

jobs:
  build-test:
    name: Node ${{ matrix.node-version }} + Homebridge ${{ matrix.homebridge-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x, 26.x]
        # "^1" keeps the Homebridge v1 compatibility claim in engines honest
        # now that the "latest" dist-tag points at 2.x.
        homebridge-version: ["^1", latest, beta]

    steps:
      # Actions pinned to commit SHAs so a compromised tag cannot inject code.
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}

      # Reject lockfile entries that resolve anywhere other than the npm
      # registry over https (defends against lockfile-poisoning PRs).
      - name: Lint lockfile
        run: npx lockfile-lint@5.0.0 --path package-lock.json --allowed-hosts npm --validate-https

      # --ignore-scripts keeps dev-dependency lifecycle scripts from running;
      # lint and build are invoked explicitly below. npm ci only: the
      # lockfile is committed, and installs must be pinned through it.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # No fallback: silently substituting another Homebridge version would
      # let a matrix cell report green without testing what it claims to.
      # Deliberately not hash-pinned (Scorecard flags this): floating specs
      # like ^1 / latest / beta are the point of the compatibility matrix.
      - name: Install Homebridge version ${{ matrix.homebridge-version }}
        run: npm install --no-save --ignore-scripts "homebridge@${{ matrix.homebridge-version }}"

      - name: Lint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Verify Plugin Metadata
        run: |
          node -e "
          const pkg = require('./package.json');
          if (!pkg.keywords.includes('homebridge-plugin')) {
            throw new Error('Missing homebridge-plugin keyword');
          }
          if (pkg.dependencies && Object.keys(pkg.dependencies).length > 0) {
            throw new Error('Plugin must have zero runtime dependencies');
          }
          console.log('Plugin metadata check passed');"

      - name: Runtime Test (Start Homebridge with Plugin)
        run: |
          mkdir -p ./homebridge-test
          cat > ./homebridge-test/config.json <<EOL
          {
            "bridge": {
              "name": "HomebridgeTest",
              "username": "0E:22:D3:AE:AC:42",
              "port": 51826,
              "pin": "031-45-154"
            },
            "platforms": [
              {
                "platform": "NOAAWeather",
                "name": "NOAA Weather",
                "latitude": 47.6204,
                "longitude": -122.3494,
                "refreshInterval": 15
              }
            ]
          }
          EOL
          npx homebridge -U ./homebridge-test -P . > ./homebridge-test/run.log 2>&1 &
          PID=$!
          sleep 15
          if ! ps -p $PID > /dev/null; then
            echo "Homebridge process exited early"
            cat ./homebridge-test/run.log
            exit 1
          fi
          kill $PID
          # Process survival alone is not enough: Homebridge keeps running
          # even when a plugin fails to load. Assert the plugin actually
          # registered and its platform initialized.
          if ! grep -q "Registering platform 'homebridge-weather-noaa.NOAAWeather'" ./homebridge-test/run.log; then
            echo "Plugin did not register with Homebridge"
            cat ./homebridge-test/run.log
            exit 1
          fi
          if ! grep -q "Initializing NOAAWeather platform" ./homebridge-test/run.log; then
            echo "Platform did not initialize"
            cat ./homebridge-test/run.log
            exit 1
          fi
          echo "Runtime test passed: plugin registered and platform initialized"
