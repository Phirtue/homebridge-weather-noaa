name: CI Build and Runtime Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege token: this workflow only needs to read the repository.
permissions:
  contents: read

jobs:
  build-test:
    name: Node ${{ matrix.node-version }} + Homebridge ${{ matrix.homebridge-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
        homebridge-version: [latest, beta]

    steps:
      # Actions pinned to commit SHAs so a compromised tag cannot inject code.
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Homebridge version ${{ matrix.homebridge-version }}
        run: |
          if npm view homebridge@${{ matrix.homebridge-version }} version > /dev/null 2>&1; then
            npm install --no-save homebridge@${{ matrix.homebridge-version }}
          else
            echo "homebridge@${{ matrix.homebridge-version }} not found, using latest"
            npm install --no-save homebridge@latest
          fi

      - name: Lint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Verify Plugin Metadata
        run: |
          node -e "
          const pkg = require('./package.json');
          if (!pkg.keywords.includes('homebridge-plugin')) {
            throw new Error('Missing homebridge-plugin keyword');
          }
          if (pkg.dependencies && Object.keys(pkg.dependencies).length > 0) {
            throw new Error('Plugin must have zero runtime dependencies');
          }
          console.log('Plugin metadata check passed');"

      - name: Runtime Test (Start Homebridge with Plugin)
        run: |
          mkdir -p ./homebridge-test
          cat > ./homebridge-test/config.json <<EOL
          {
            "bridge": {
              "name": "HomebridgeTest",
              "username": "0E:22:D3:AE:AC:42",
              "port": 51826,
              "pin": "031-45-154"
            },
            "platforms": [
              {
                "platform": "NOAAWeather",
                "name": "NOAA Weather",
                "latitude": 47.91288,
                "longitude": -122.09818,
                "refreshInterval": 15
              }
            ]
          }
          EOL
          npx homebridge -U ./homebridge-test &
          PID=$!
          sleep 10
          if ps -p $PID > /dev/null; then
            echo "Homebridge started successfully with plugin"
            kill $PID
          else
            echo "Homebridge failed to start"
            exit 1
          fi
