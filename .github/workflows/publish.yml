name: Publish to npm

# Publishes when a GitHub release is created. Authenticates via npm
# trusted publishing (GitHub Actions OIDC) — no npm token is stored
# anywhere. The trusted publisher for this workflow is configured on
# npmjs.com under the package's Settings.
on:
  release:
    types: [published]

# Read-only at the top level; write grants live on the job that needs
# them, so a job added later cannot inherit them by accident.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the SBOM to the GitHub release
      id-token: write # OIDC token for npm provenance attestation
    outputs:
      # Consumed by the provenance job below; the hashes are the only thing
      # that crosses the job boundary.
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      # Records every outbound connection from the runner (visible in the
      # StepSecurity dashboard linked from the job log). Audit mode for now:
      # the publish path talks to npm, GitHub, and Sigstore, and a wrong
      # egress allowlist here would break releases. Tighten to block mode
      # once a few release runs confirm the endpoint list.
      - name: Harden runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      # Actions pinned to commit SHAs so a compromised tag cannot inject code.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node 24 bundles npm >= 11.16, which satisfies the npm >= 11.5.1
      # floor for trusted publishing, so no separate npm upgrade (which
      # would be an unpinned install at release time) is needed.
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Reject lockfile entries that resolve anywhere other than the npm
      # registry over https (defends against lockfile poisoning).
      - name: Lint lockfile
        run: npx lockfile-lint@5.0.0 --path package-lock.json --allowed-hosts npm --validate-https

      # --ignore-scripts keeps dev-dependency lifecycle scripts from running;
      # lint and build are invoked explicitly below.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Last gate before publish: nothing ships without the unit suite
      # passing in the same environment that built the tarball.
      - name: Unit tests
        run: npm test

      # Guard the trusted-publishing floor explicitly, since it now relies
      # on the npm bundled with the Node version above.
      - name: Verify npm supports trusted publishing
        run: |
          npm --version
          node -e "const [maj, min, pat] = require('child_process').execSync('npm --version').toString().trim().split('.').map(Number); if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && pat < 1)))) { console.error('npm >= 11.5.1 required for trusted publishing'); process.exit(1); }"

      # --provenance links the published tarball to this exact commit and
      # workflow run via a Sigstore attestation shown on npmjs.com.
      # Authentication happens via OIDC (id-token: write), not a token.
      - name: Publish with provenance
        run: npm publish --provenance --access public

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cdx.json

      # Keyless (Sigstore) signature over the SBOM: the same OIDC identity
      # that authenticates the npm publish signs the release asset, so there
      # is no long-lived signing key to store or leak. Verify with:
      #   cosign verify-blob sbom.cdx.json \
      #     --bundle sbom.cdx.json.sigstore.json \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     --certificate-identity-regexp 'github.com/Phirtue/homebridge-weather-noaa'
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOM (Sigstore keyless)
        run: cosign sign-blob --yes --bundle sbom.cdx.json.sigstore.json sbom.cdx.json

      # npm pack is byte-identical to what npm publish sent (same tree, and
      # pack normalizes timestamps), so hashing this tarball lets the SLSA
      # provenance below cover the artifact users actually install.
      - name: Pack tarball for provenance
        run: npm pack

      - name: Compute artifact hashes for provenance
        id: hash
        run: echo "hashes=$(sha256sum homebridge-weather-noaa-*.tgz sbom.cdx.json | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM, signature, and tarball to release
        run: gh release upload "$TAG" sbom.cdx.json sbom.cdx.json.sigstore.json homebridge-weather-noaa-*.tgz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}

  # SLSA build provenance, generated by the OpenSSF's isolated builder
  # workflow rather than by the publish job itself: the builder receives
  # only the artifact hashes, so even a compromised publish job cannot
  # forge provenance for different bytes. Referenced by tag, not SHA —
  # the generator requires this for its own internal verification, and
  # Scorecard explicitly exempts slsa-framework from pinning warnings.
  # Verify a release with:
  #   slsa-verifier verify-artifact homebridge-weather-noaa-<ver>.tgz \
  #     --provenance-path homebridge-weather-noaa.intoto.jsonl \
  #     --source-uri github.com/Phirtue/homebridge-weather-noaa
  provenance:
    needs: publish
    permissions:
      actions: read # read this workflow run's metadata into the provenance
      id-token: write # sign the provenance via Sigstore
      contents: write # upload the .intoto.jsonl to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      provenance-name: homebridge-weather-noaa.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.event.release.tag_name }}
